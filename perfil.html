<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Mi Perfil | Vittalium </title>
    <link rel="stylesheet" href="./css/styles.css">
    <link rel="stylesheet" href="./css/productos.css">
    <link rel="stylesheet" href="css/carrito.css">
    <link rel="stylesheet" href="./css//perfil.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="./logo.png">

</head>
<body>
    <!-- Navbar Container -->
    <header id="navbar-container">
        <!-- El navbar se carga aquí automáticamente -->
    </header> 
    

    <div class="personal-info-container">
        <!-- Encabezado del cuadro -->
        <div class="info-header">
            <div class="header-left">
                <svg class="header-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke-width="2" stroke-linecap="round"/>
                    <circle cx="12" cy="7" r="4" stroke-width="2"/>
                </svg>
                <h2 class="info-title">Información Personal</h2>
            </div>
            <button class="edit-button" id="editBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M17 3L21 7L7 21H3V17L17 3Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Editar
            </button>
        </div>

        <!-- Modo Vista (datos) -->
        <div id="viewMode" class="view-mode">
            <div class="info-grid">
                <!-- Columna Izquierda -->
                <div class="info-column">
                    <!-- Nombre -->
                    <div class="info-row">
                        <span class="info-label">Nombre</span>
                        <span class="info-value" id="view-nombre">Nombre</span>
                    </div>

                    <!-- Email -->
                    <div class="info-row">
                        <span class="info-label">Email</span>
                        <span class="info-value" id="view-email">ejemplo@email.com</span>
                    </div>

                    <!-- Dirección -->
                    <div class="info-row">
                        <span class="info-label">Dirección</span>
                        <span class="info-value" id="view-direccion">Calle, Numero, Alcaldia o Colonia</span>
                    </div>

                    <!-- Ciudad -->
                    <div class="info-row">
                        <span class="info-label">Ciudad</span>
                        <span class="info-value" id="view-ciudad">Ciudad</span>
                    </div>

                    <!-- Código Postal -->

                </div>

                <!-- Columna Derecha -->
                <div class="info-column">
                    <!-- Apellido -->
                    <div class="info-row">
                        <span class="info-label">Apellido</span>
                        <span class="info-value" id="view-apellido">Apellido</span>
                    </div>

                    <!-- Teléfono -->
                    <div class="info-row">
                        <span class="info-label">Teléfono</span>
                        <span class="info-value" id="view-telefono">+52 555 123 4567</span>
                    </div>

                    <!-- Estado -->
                    <div class="info-row">
                        <span class="info-label">Estado</span>
                        <span class="info-value" id="view-estado">CDMX</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Código Postal</span>
                        <span class="info-value" id="view-codigoPostal">00000</span>
                    </div>


                    <!-- Fila vacía para mantener equilibrio -->
                    <div class="info-row empty-row"></div>
                </div>
            </div>
        </div>

        <!-- Modo Edición (formulario) -->
        <div id="editMode" class="edit-mode hidden">
            <form id="personalInfoForm">
                <div class="info-grid">
                    <!-- Columna Izquierda -->
                    <div class="info-column">
                        <!-- Nombre -->
                        <div class="form-row">
                            <label class="form-label">Nombre</label>
                            <input type="text" id="edit-nombre" class="form-input" value="Juan">
                            <div class="error-message" id="error-nombre"></div>
                        </div>

                        <!-- Email -->
                        <div class="form-row">
                            <label class="form-label">Email</label>
                            <input type="email" id="edit-email" class="form-input" value="juan.perez@email.com">
                            <div class="error-message" id="error-email"></div>
                        </div>

                        <!-- Dirección -->
                        <div class="form-row">
                            <label class="form-label">Dirección</label>
                            <input type="text" id="edit-direccion" class="form-input" value="Av. Reforma 123, Col. Centro">
                            <div class="error-message" id="error-direccion"></div>
                        </div>

                        <!-- Ciudad -->
                        <div class="form-row">
                            <label class="form-label">Ciudad</label>
                            <input type="text" id="edit-ciudad" class="form-input" value="Ciudad de México">
                            <div class="error-message" id="error-ciudad"></div>
                        </div>

                        <!-- Código Postal -->
                        <div class="form-row">
                            <label class="form-label">Código Postal</label>
                            <input type="text" id="edit-codigoPostal" class="form-input" value="06000">
                            <div class="error-message" id="error-codigoPostal"></div>
                        </div>
                    </div>

                    <!-- Columna Derecha -->
                    <div class="info-column">
                        <!-- Apellido -->
                        <div class="form-row">
                            <label class="form-label">Apellido</label>
                            <input type="text" id="edit-apellido" class="form-input" value="Pérez">
                            <div class="error-message" id="error-apellido"></div>
                        </div>

                        <!-- Teléfono -->
                        <div class="form-row">
                            <label class="form-label">Teléfono</label>
                            <input type="tel" id="edit-telefono" class="form-input" value="+52 555 123 4567">
                            <div class="error-message" id="error-telefono"></div>
                        </div>

                        <!-- Estado -->
                        <div class="form-row">
                            <label class="form-label">Estado</label>
                            <input type="text" id="edit-estado" class="form-input" value="CDMX">
                            <div class="error-message" id="error-estado"></div>
                        </div>


                        <!-- Fila vacía -->
                        <div class="form-row empty-row"></div>
                    </div>
                </div>

                <!-- Botones de acción -->
                <div class="form-actions">
                    <button type="button" id="cancelBtn" class="btn btn-secondary">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar Cambios</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast para notificaciones -->
    <div id="toast" class="toast hidden">
        <div class="toast-content">
            <span id="toast-message"></span>
        </div>
    </div>

    <script src="./js/perfil.js"></script>

    
    <!-- Footer Container -->
    <div id="footer-container">
        <!-- El footer se carga aquí automáticamente -->
    </div>

    <!-- Script para cargar componentes -->
    <script src="./js/components.js"></script>
    <script src="./js/navbar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/cart-logic.js"></script>
    <script src="./js/carrito.js"></script>

</body>
</html>
